<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobe</title>
  <script type="importmap">
  {
    "imports": {
      "aoye": "./node_modules/aoye/dist/aoye.esm.js",
      "bobe-shared": "./node_modules/bobe-shared/dist/bobe-shared.esm.js",
      "bobe": "./dist/bobe.esm.js"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
</body>
<script type="module">
  import { bobe, Store, customRender } from 'bobe';
  // 指定版本号以确保 API 兼容性
  // import { Bench } from 'https://esm.sh/tinybench@2.9.0';
  const render = customRender({
    createNode (name) {
      if (name === 'text') {
        return document.createTextNode('');
      }
      return document.createElement(name);
    },
    setProp (node, key, value, hookI) {
      if (key === 'text') {
        node.textContent = value;
      } else if (key.startsWith('on')) {
        node.addEventListener(key.slice(2), value);
      } else if (node.tagName === 'INPUT' && key === 'value') {
        node.value = value;
      }

      else {
        node.setAttribute(key, value);
      }
    },
    insertAfter (parent, node, prev) {
      // 没有前置节点的情况下，可能有 anchor 占据 firstChild ，所以这里应该插入在 firstChild 前
      if (!prev) {
        parent.insertBefore(node, parent.firstChild);
      } else {
        parent.insertBefore(node, prev.nextSibling)
      }
    },
    createAnchor (name) {
      return document.createComment(name);
    },
    remove (node) {
      node.remove();
    },
    firstChild (node) {
      return node.firstChild;
    },
    nextSib (node) {
      return node.nextSibling;
    },
  });

  class B extends Store {
    v = 1;
    name = '😁';
    updateName = () => {
      this.name = '🤡';
    };
    ui = bobe`
      div text={v}
      div text={name}
    `;
  }

  class Deep extends Store {
    deep = 10
    ui = bobe`
      div text={deep}
      if deep > 0
        ${Deep} deep={deep - 1}
    `;
  }

  class App extends Store {
    show1 = true;
    show2 = true;
    name = '米龙';

    update1 = () => {
      this.show1 = !this.show1;
    }
    update2 = () => {
      this.show2 = !this.show2;
    }
    renderDeep = bobe`
      div text={deep}
      if deep > 0
        {renderDeep} deep={deep - 1}
    `;

    ui = bobe`
      header
        h1 text={name}
        button style="cursor: pointer;" text={'show1:'+show1} onclick={update1}
        button style="cursor: pointer;" text={'show2:'+show2} onclick={update2}
        nav
          ul
            li
              a href="#home" text="首页"
            li
              a href="#services" text="服务"
            li
              a href="#contact" text="联系我们"
      main
        section id="home"
          h2 text="欢迎来到我们的页面"
          p text="这是一个纯 HTML 结构的示例，不包含任何 CSS 样式。"
        section id="services"
          h2 text="我们的服务"
          ul
            li text="网页设计"
            li text="后端开发"
            li text="数据分析"
        section id="contact"
          h2 text="联系我们"
          form action="/submit" method="post"
            label for="name" text="姓名："
            input type="text" id="name" name="name" required=true
            br
            label for="email" text="邮箱："
            input type="email" id="email" name="email"
            br
            label for="message" text="留言："
            textarea id="message" name="message"
            br
            button type="submit" text="提交表单"
      footer
        p text="© 2026 示例公司. 保留所有权利。"
    `;
  };

  class TestIf extends Store {
    show1 = true;
    show2 = true;
    show3 = true;
    fragment = bobe`
      div text={deep}
      if deep > 0
        {fragment} deep={deep - 1}
    `;
    ui = bobe`
      button onclick={() => show1 = !show1}
        {"切换1:" + show1}
      button onclick={() => show2 = !show2}
        {show2}
      button onclick={() => show3 = !show3}
        {'内部切换:' + show3}
      if show1
        {fragment} deep=10
        h1 text="show1"
      if show2 
        h2 text="show2"
        if show3
          h3 text="内部"
      else 
        h1 text="else back"  
      ${Deep} deep=20
    `
  }


  class TestFor1 extends Store {
    arr = [
      { value: 1 },
      { value: 2 },
      { value: 3 }
    ]
    show = true
    value = ''
    onkeyup = (e) => {
      if (e.keyCode === 13) {
        this.arr.push({ value: this.value })
        this.value = ''
      }
    }
    oninput = (e) => {
      this.value = e.target.value
    }

    delItem = (i) => {
      this.arr.splice(i, 1)
    }

    updateItem = (i, value) => {
      this.arr[i] = { value }
    }

    ui = bobe`
      h2 text="测试"
      input value={value} oninput={oninput} onkeyup={onkeyup}
      for arr; item i
        div style="display: flex; align-items: center;"
          h1 onclick={() => delItem(i)}
            {item.value}
          input type="text"  oninput={(e) => updateItem(i, e.target.value)} 
      if show    
        div
          {'哈哈哈'}  
    `
  }
  class TestFor2 extends Store {
    arr = [
      { value: 1, id: 1 },
      { value: 2, id: 2 },
      { value: 3, id: 3 },
    ]
    show = true
    value = ''
    onkeyup = (e) => {
      if (e.keyCode === 13) {
        this.arr.push({ value: this.value })
        this.value = ''
      }
    }
    oninput = (e) => {
      this.value = e.target.value
    }

    delItem = (i) => {
      this.arr.splice(i, 1)
    }

    updateItem = (i, value) => {
      this.arr[i].value = value
    }

    ui = bobe`
      h2 text="测试"
      input value={value} oninput={oninput} onkeyup={onkeyup}
      for arr; {value} i
        div style="display: flex; align-items: center;"
          h1 onclick={() => delItem(i)}
            {value}
          input type="text"  oninput={(e) => updateItem(i, e.target.value)} 
      if show    
        div
          {'哈哈哈'}  
    `
  }

  class Keyed extends Store {
    arr = [
      { value: 1, id: 1 },
      { value: 2, id: 2 },
      { value: 3, id: 3 }
    ]
    show = true
    value = ''
    onkeyup = (e) => {
      if (e.keyCode === 13) {
        this.arr.push({ value: this.value, id: Date.now() })
        this.value = ''
      }
    }
    oninput = (e) => {
      this.value = e.target.value
    }

    delItem = (i) => {
      this.arr.splice(i, 1)
    }

    updateItem = (i, value) => {
      // this.arr[i].value = value;
      // this.arr[i] = { value, id: Date.now() }
      this.arr = [
        { value: 3, id: 3 },
        { value: 1, id: 1 },
        { value: 2, id: 2 }
      ]
    }

    ui = bobe`
      h2 text="测试"
      input value={value} oninput={oninput} onkeyup={onkeyup}
      for arr; item i; item.id
        div style="display: flex; align-items: center;"
          h1 onclick={() => delItem(i)}
            {item.value}
          input type="text"  oninput={(e) => updateItem(i, e.target.value)} 
      if show    
        div
          {'哈哈哈'}  
    `
  }

  const root2 = document.getElementById('root')
  render(Keyed, root2)
  window.cel = (obj, key) => {
    const cells = obj['__AOYE_META'].cells;
    return cells.get(key);
  }


</script>

</html>
